LineageOS-23.0:
  kernel:
    - git clone --depth=1 -b lineage-23.0 https://github.com/LineageOS/android_kernel_razer_sg8175p
  clang:
    - git clone --depth=1 -b master https://github.com/kdrag0n/proton-clang
  config:
    - make O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- vendor/lahaina-qgki_defconfig
  build:
    - make O=out ARCH=arm64 -j$(nproc) LLVM=1 LLVM_IAS=1 CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
  target:
    - out/arch/arm64/boot/Image
  kernelSU:
    - default
  anykernel:
    - default

KernelSU:
  version:
    default:
      - curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/v0.7.6/kernel/setup.sh" | bash -

AnyKernel3:
  version:
    default:
      - git clone --depth=1 -b master https://github.com/osm0sis/AnyKernel3

Clean:
  out:
    - make O=out clean
  kernel:
    - git reset --hard
  custom:
    - git clean -fd
